    <!-- Título da Página -->
    <h1>Formatador de Texto</h1>

    <!-- Container Principal -->
    <div class="container">
        <!-- Caixa de Texto Original -->
        <div class="text-center w-100">
            <textarea id="inputText" class="form-control" placeholder="Cole o texto original aqui..."></textarea>
            <button class="btn btn-primary mt-3" onclick="formatText()">Formatar Texto</button>
        </div>

        <!-- Caixa de Texto Formatado -->
        <div class="text-center w-100">
            <textarea id="outputText" class="form-control" placeholder="Texto formatado aparecerá aqui..." readonly></textarea>
            <div class="buttons-container mt-3">
                <button class="btn btn-success" onclick="copyText()">Copiar Texto</button>
                <button class="btn btn-danger" onclick="clearTexts()">Limpar Textos</button>
            </div>
        </div>
    </div>

    <script>
      // Função para identificar títulos e adicionar ponto final
      function addPeriodToTitles(text) {
          const lines = text.split('\n');
          let processedLines = [];
  
          for (let i = 0; i < lines.length; i++) {
              const line = lines[i].trim();
  
              // Critérios simples para detectar título
              const isShortLine = line.split(' ').length <= 6;
              const startsWithCapital = line[0] === line[0].toUpperCase();
              const endsWithPunctuation = /[.!?]$/.test(line);
              const isEmptyAbove = i > 0 && lines[i - 1].trim() === '';
              const isEmptyBelow = i < lines.length - 1 && lines[i + 1].trim() === '';
  
              if (
                  isShortLine &&
                  startsWithCapital &&
                  !endsWithPunctuation &&
                  (isEmptyAbove || isEmptyBelow)
              ) {
                  // Adiciona ponto final se não tiver
                  processedLines.push(line + '.');
              } else {
                  processedLines.push(line);
              }
          }
  
          return processedLines.join('\n');
      }
  
      // Função para formatar o texto
      function formatText() {
    let inputText = document.getElementById('inputText').value;

    // Passo 1: Adicionar ponto final nos títulos (se necessário)
    inputText = addPeriodToTitles(inputText);

    // Passo 2: Remove múltiplos espaços, mas preserva quebras de linha originais
    let formattedText = inputText
        .replace(/[^\S\r\n]+/g, ' ') // Substitui múltiplos espaços, mas mantém \n e \r
        .trim(); // Remove espaços iniciais/finais

    // Passo 3: Pula linha após pontuação: . ? ! ...
    formattedText = formattedText.replace(/(\.\.\.|\?|!|\.)\s*/g, '$1\n');

    // Passo 4 (opcional): Remover espaços extras antes da pontuação
    formattedText = formattedText.replace(/\s+([.!?])/, '$1');

    // Atualiza a caixa de saída
    document.getElementById('outputText').value = formattedText;
  }

      // Função para copiar o texto formatado
      function copyText() {
          const outputText = document.getElementById('outputText');
          outputText.select(); // Seleciona o texto
          document.execCommand('copy'); // Copia o texto para a área de transferência
          alert("Texto copiado!");
      }

      // Função para limpar os textos das duas caixas
      function clearTexts() {
          document.getElementById('inputText').value = ''; // Limpa a caixa de entrada
          document.getElementById('outputText').value = ''; // Limpa a caixa de saída
      }
    </script>
