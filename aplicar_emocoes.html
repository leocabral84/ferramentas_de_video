    /* ============ 🎯 ESTILOS DA NAVBAR/MENU ============ */
    .navbar {

        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);

        max-width: 1200px;
        margin-left: auto;
        margin-right: auto;
    }
    .navbar-brand {
        font-size: 1.3rem;
        font-weight: 700;
        color: #fff !important;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: opacity 0.3s;
    }
    .navbar-brand:hover { opacity: 0.9; }
    .navbar-brand::before { font-size: 1.4rem; } /* Ícone alterado para teatro */
    .navbar-toggler {
        border: none; padding: 0.5rem; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        background: transparent;
    }
    .navbar-toggler:focus {
        outline: none; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.5); border-radius: 4px;
    }
    .navbar-toggler-icon {
        display: inline-block; width: 24px; height: 2px;
        background: #fff; position: relative; transition: all 0.3s;
    }
    .navbar-toggler-icon::before, .navbar-toggler-icon::after {
        content: ''; position: absolute; width: 24px; height: 2px;
        background: #fff; left: 0; transition: all 0.3s;
    }
    .navbar-toggler-icon::before { top: -7px; }
    .navbar-toggler-icon::after { top: 7px; }
    .navbar-toggler[aria-expanded="true"] .navbar-toggler-icon { background: transparent; }
    .navbar-toggler[aria-expanded="true"] .navbar-toggler-icon::before { transform: rotate(45deg) translate(4px, 4px); }
    .navbar-toggler[aria-expanded="true"] .navbar-toggler-icon::after { transform: rotate(-45deg) translate(4px, -4px); }
    .navbar-collapse { transition: max-height 0.3s ease-out; }
    .navbar-collapse:not(.show) { display: none; }
    .navbar-nav {
        display: flex; flex-wrap: wrap; gap: 4px;
        list-style: none; margin: 0; padding: 0;
    }
    .nav-item { display: flex; align-items: center; }
    .nav-link {
        color: #e2e8f0 !important; text-decoration: none;
        padding: 8px 14px; font-size: 0.9rem; font-weight: 500;
        border-radius: 6px; transition: all 0.25s ease; white-space: nowrap;
    }
    .nav-link:hover {
        color: #fff !important; background: rgba(102, 126, 234, 0.25);
        transform: translateY(-1px);
    }
    .nav-link.active {
        color: #fff !important; background: linear-gradient(135deg, #667eea, #764ba2);
        box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4);
    }
    /* Responsivo */
    @media (max-width: 991px) {
        .navbar-nav { flex-direction: column; align-items: flex-start; gap: 2px; margin-top: 10px; }
        .nav-link { width: 100%; padding: 10px 14px; }
        .navbar-collapse.show { display: block; max-height: 400px; overflow-y: auto; }
    }
    @media (max-width: 576px) {
        .navbar { padding: 0.5rem; border-radius: 10px; }
        .navbar-brand { font-size: 1.1rem; }
        .nav-link { font-size: 0.85rem; padding: 8px 12px; }

  <!-- Título da Página -->
  <h1>Aplicador de Emoções em Textos</h1>

  <!-- Container Principal -->
  <div class="container">
    <!-- Seção de Entrada -->
    <div class="text-center w-100">
      <textarea id="inputText" class="form-control" placeholder="Cole o texto original aqui..."></textarea>
      <div class="buttons-container mt-3">
        <button class="btn btn-primary" onclick="applyEmotions()">Aplicar</button>
        <button class="btn btn-danger" onclick="clearAll()">Limpar</button>
      </div>
    </div>

    <!-- Seção de Seleção de Emoções -->
    <div class="emotion-buttons">
      <label>
        <input type="checkbox" id="alegria" value="alegria">
        <span>Alegria</span>
      </label>
      <label>
        <input type="checkbox" id="tristeza" value="tristeza">
        <span>Tristeza</span>
      </label>
      <label>
        <input type="checkbox" id="raiva" value="raiva">
        <span>Raiva</span>
      </label>
      <label>
        <input type="checkbox" id="surpresa" value="surpresa">
        <span>Surpresa</span>
      </label>
      <label>
        <input type="checkbox" id="medo" value="medo">
        <span>Medo</span>
      </label>
      <label>
        <input type="checkbox" id="enfase" value="enfase">
        <span>Ênfase</span>
      </label>
    </div>

    <!-- Seção de Saída -->
    <div class="text-center w-100">
      <textarea id="outputText" class="form-control" placeholder="Texto com emoções aplicadas aparecerá aqui..." readonly></textarea>
      <div class="buttons-container mt-3">
        <button class="btn btn-success" onclick="copyText()">Copiar Texto</button>
      </div>
    </div>
  </div>

  <script>
    // Função para aplicar as emoções no texto
    function applyEmotions() {
      const inputText = document.getElementById('inputText').value.trim();
      let outputText = inputText;

      // Verifica quais emoções foram selecionadas
      const emotions = [];
      if (document.getElementById('alegria').checked) emotions.push('alegria');
      if (document.getElementById('tristeza').checked) emotions.push('tristeza');
      if (document.getElementById('raiva').checked) emotions.push('raiva');
      if (document.getElementById('surpresa').checked) emotions.push('surpresa');
      if (document.getElementById('medo').checked) emotions.push('medo');
      if (document.getElementById('enfase').checked) emotions.push('enfase');

      // Aplica os códigos SSML com base nas emoções selecionadas
      for (const emotion of emotions) {
        switch (emotion) {
          case 'alegria':
            outputText = `<prosody pitch="+15%" rate="fast">${outputText}</prosody>`;
            break;
          case 'tristeza':
            outputText = `<prosody pitch="-10%" rate="slow" volume="soft">${outputText}</prosody>`;
            break;
          case 'raiva':
            outputText = `<prosody pitch="+10%" rate="fast" volume="loud">${outputText}</prosody>`;
            break;
          case 'surpresa':
            outputText = `<prosody pitch="+20%" rate="medium">${outputText}</prosody>`;
            break;
          case 'medo':
            outputText = `<prosody pitch="-5%" rate="fast" volume="medium">${outputText}</prosody>`;
            break;
          case 'enfase':
            outputText = `<emphasis level="strong">${outputText}</emphasis>`;
            break;
        }
      }

      // Exibe o texto formatado na caixa de saída
      document.getElementById('outputText').value = outputText;
    }

    // Função para copiar o texto formatado
    function copyText() {
      const outputText = document.getElementById('outputText');
      outputText.select(); // Seleciona o texto
      document.execCommand('copy'); // Copia o texto para a área de transferência
    
    }

    // Função para limpar todos os campos
    function clearAll() {
      document.getElementById('inputText').value = ''; // Limpa a caixa de entrada
      document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => checkbox.checked = false); // Desmarca todas as emoções
      document.getElementById('outputText').value = ''; // Limpa a caixa de saída
    }

    // Toggle do menu mobile
    document.querySelector('.navbar-toggler')?.addEventListener('click', function() {
        const collapse = document.getElementById('navbarNav');
        const isExpanded = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', !isExpanded);
        if (!isExpanded) {
            collapse.classList.add('show');
            collapse.style.maxHeight = collapse.scrollHeight + 'px';
        } else {
            collapse.classList.remove('show');
            collapse.style.maxHeight = null;
        }
    });

    // Fechar menu ao clicar em um link (mobile)
    document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', () => {
            const collapse = document.getElementById('navbarNav');
            const toggler = document.querySelector('.navbar-toggler');
            if (window.innerWidth <= 991 && collapse.classList.contains('show')) {
                collapse.classList.remove('show');
                collapse.style.maxHeight = null;
                toggler.setAttribute('aria-expanded', 'false');
            }
        });
    });

    // Ajustar menu ao redimensionar janela
    window.addEventListener('resize', () => {
        if (window.innerWidth > 991) {
            const collapse = document.getElementById('navbarNav');
            collapse.classList.remove('show');
            collapse.style.maxHeight = null;
            document.querySelector('.navbar-toggler')?.setAttribute('aria-expanded', 'false');
        }
    });
  </script>
</body>
